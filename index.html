<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Surprise</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center;
            align-items: center; z-index: 100;
        }

        .start-btn {
            padding: 15px 40px; font-size: 18px; background: transparent;
            color: #00bfff; border: 2px solid #00bfff; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px #00bfff;
        }

        /* 3D Scene Container */
        .scene {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 360px; height: 360px;
            perspective: 1200px;
            display: none; z-index: 50;
        }

        .cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 18s linear infinite;
        }

        /* 3D Faces */
        .face {
            position: absolute;
            width: 260px; height: 360px;
            border: 2px solid rgba(0, 191, 255, 0.6);
            border-radius: 12px;
            overflow: hidden;
            backface-visibility: hidden;
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.4);
        }

        .face img { width: 100%; height: 100%; object-fit: cover; }

        /* 3D Positioning (ပုံ ၅ ပုံအတွက် ၇၂ ဒီဂရီစီ ခွဲထားပါသည်) */
        .face:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .face:nth-child(2) { transform: rotateY(72deg) translateZ(250px); }
        .face:nth-child(3) { transform: rotateY(144deg) translateZ(250px); }
        .face:nth-child(4) { transform: rotateY(216deg) translateZ(250px); }
        .face:nth-child(5) { transform: rotateY(288deg) translateZ(250px); }

        @keyframes rotateCube {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="beginSurprise()">♥️Click Here For You ♥️</button>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div class="scene" id="slider-panel">
        <div class="cube">
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495308243-639170b1-6464-4478-bb4e-78a047322292.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495474949-2ef3a0ce-3a29-4724-8baf-05d9e27c0a54.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495520928-998856eb-ad29-41d4-8760-d4995f64de15.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495631754-3141cb10-d4ba-48f0-be88-2eb8868d53f7.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495663086-2759e69b-3e1d-44db-b5e4-f9788043af95.jpg"></div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.image2url.com/r2/default/audio/1776495159265-5288f941-a2e1-4411-bb8c-27d666f80b64.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = this.x; this.targetY = this.y;
                this.size = Math.random() * 1.8 + 0.8;
                this.color = `hsla(195, 100%, 75%, ${Math.random() * 0.9 + 0.1})`;
                this.speed = Math.random() * 0.05 + 0.03;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 12; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        for (let i = 0; i < 2000; i++) particles.push(new Particle());

        function beginSurprise() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgMusic').play();
            showHeart();
            setTimeout(showText, 5500);
            setTimeout(showPhotos, 11500);
            animate();
        }

        function showHeart() {
            particles.forEach((p, i) => {
                let t = Math.random() * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                p.targetX = x * 10 + canvas.width / 2;
                p.targetY = y * 10 + canvas.height / 2;
            });
        }

        function showText() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 70px 'Arial Black', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("My Love is...", canvas.width/2, canvas.height/2);
            
            const imageData = ctx.getImageData(0,0,canvas.width, canvas.height).data;
            let points = [];
            for (let y=0; y<canvas.height; y+=3) { 
                for (let x=0; x<canvas.width; x+=3) {
                    if (imageData[(y * canvas.width + x) * 4 + 3] > 128) points.push({x, y});
                }
            }
            particles.forEach((p, i) => {
                let pt = points[i % points.length];
                p.targetX = pt.x; p.targetY = pt.y;
            });
        }

        function showPhotos() {
            // အမှုန်များကို အနှံ့အပြားသို့ ပြန်လည်ဖြန့်ထုတ်လိုက်ခြင်း
            particles.forEach(p => { 
                p.targetX = Math.random() * canvas.width;
                p.targetY = Math.random() * canvas.height;
                p.speed = 0.01; // အနှေးလွင့်စေရန်
            });
            setTimeout(() => { 
                document.getElementById('slider-panel').style.display = 'block'; 
            }, 1000);
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
