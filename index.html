<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Neo Heart Surprise</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; z-index: 100;
        }

        .start-btn {
            padding: 15px 40px; font-size: 18px; background: transparent;
            color: #ff0033; border: 2px solid #ff0033; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px #ff0033;
            background: rgba(0,0,0,0.4);
        }

        #lyric-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 80%;
            pointer-events: none; display: none;
        }

        .lyric-text {
            color: #fff; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }

        .scene {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 350px;
            perspective: 1200px; display: none; z-index: 50;
        }

        .cube {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; animation: rotateCube 18s linear infinite;
        }

        .face {
            position: absolute; width: 250px; height: 350px;
            border: 2px solid rgba(255, 0, 51, 0.6); border-radius: 12px;
            overflow: hidden; backface-visibility: hidden;
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.4);
        }

        .face img { width: 100%; height: 100%; object-fit: cover; }

        .face:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .face:nth-child(2) { transform: rotateY(72deg) translateZ(250px); }
        .face:nth-child(3) { transform: rotateY(144deg) translateZ(250px); }
        .face:nth-child(4) { transform: rotateY(216deg) translateZ(250px); }
        .face:nth-child(5) { transform: rotateY(288deg) translateZ(250px); }

        @keyframes rotateCube {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body onload="init()">

    <div id="overlay">
        <button class="start-btn" onclick="beginSurprise()">♥️Click Here For You ♥️</button>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div id="lyric-container">
        <div id="lyric" class="lyric-text"></div>
    </div>

    <div class="scene" id="slider-panel">
        <div class="cube">
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495308243-639170b1-6464-4478-bb4e-78a047322292.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495474949-2ef3a0ce-3a29-4724-8baf-05d9e27c0a54.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495520928-998856eb-ad29-41d4-8760-d4995f64de15.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495631754-3141cb10-d4ba-48f0-be88-2eb8868d53f7.jpg"></div>
            <div class="face"><img src="https://www.image2url.com/r2/default/images/1776495663086-2759e69b-3e1d-44db-b5e4-f9788043af95.jpg"></div>
        </div>
    </div>

    <audio id="bgMusic">
        <source src="https://www.image2url.com/r2/default/audio/1776495159265-5288f941-a2e1-4411-bb8c-27d666f80b64.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let backgroundParticles = []; // နောက်ခံအမှုန်များအတွက်
        let animationMode = "start"; // start, heart, photos
        
        // Neo Love Color (နီရဲရဲတောက်ပသောအရောင်)
        const neoLoveColor = 'hsla(350, 100%, 60%, 0.9)'; 
        
        const lyrics = [
            { text: "မင်းလုပ်ပေးတတ်တဲ့ အသေးအမွှားလေးတွေကို ငါမြတ်နိုးတယ်", time: 1000 },
            { text: "အဲ့ဒီ အရာလေးတွေကပဲ မင်းကို ငါဘာကြောင့် အသည်းစွဲအောင် ချစ်ခဲ့ရလဲဆိုတာကို အမြဲတမ်း သတိပေးနေတာပါ", time: 5500 },
            { text: " 💕💕💕...", time: 9000 }
        ];

        class Particle {
            constructor(isBackground = false) { 
                this.isBackground = isBackground;
                this.reset(); 
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = this.x; this.targetY = this.y;
                
                // နောက်ခံအမှုန်ဆိုလျှင် ပိုသေးပြီး ပိုမြန်အောင်လုပ်သည်
                this.size = this.isBackground ? (Math.random() * 1 + 0.5) : (Math.random() * 1.8 + 0.8);
                this.speed = this.isBackground ? (Math.random() * 0.02 + 0.005) : (Math.random() * 0.05 + 0.02);
                
                // Neo Love Color အတွက် alpha transparency ကို random ပေးသည်
                this.color = `hsla(350, 100%, 60%, ${Math.random() * 0.7 + 0.3})`;
            }
            update() {
                if (this.isBackground) {
                    // နောက်ခံအမှုန်များကို အလိုအလျောက် ပြေးနေစေခြင်း
                    this.x += (Math.random() - 0.5) * 2; 
                    this.y += (Math.random() - 0.5) * 2;
                    
                    // Canvas ဘောင်ကျော်လျှင် ပြန်ထည့်ခြင်း
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                } else {
                    // အဓိကအမှုန်များကို target ဆီသို့ သွားစေခြင်း
                    this.x += (this.targetX - this.x) * this.speed;
                    this.y += (this.targetY - this.y) * this.speed;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                // Neo Glow effect
                ctx.shadowBlur = this.isBackground ? 8 : 12; 
                ctx.shadowColor = '#ff0033';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function init() {
            // အဓိကအမှုန် ၂၀၀၀ (အသည်းပုံဖော်ရန်)
            for (let i = 0; i < 2000; i++) particles.push(new Particle(false));
            
            // နောက်ခံပြေးနေမည့်အမှုန် ၅၀၀ (isBackground = true)
            for (let i = 0; i < 500; i++) backgroundParticles.push(new Particle(true));
            
            animate();
        }

        function beginSurprise() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgMusic').play();
            document.getElementById('lyric-container').style.display = 'block';
            
            animationMode = "heart";
            showHeart();
            startLyrics();
        }

        function showHeart() {
            // အဓိကအမှုန်များကို အသည်းပုံဖော်ခိုင်းခြင်း
            particles.forEach((p) => {
                p.speed = Math.random() * 0.05 + 0.03;
                let t = Math.random() * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                p.targetX = x * 10 + canvas.width / 2;
                p.targetY = y * 10 + canvas.height / 2;
            });
        }

        function startLyrics() {
            const lyricEl = document.getElementById('lyric');
            lyrics.forEach((line, index) => {
                setTimeout(() => {
                    lyricEl.innerText = line.text;
                    lyricEl.style.opacity = 1;
                    
                    setTimeout(() => { lyricEl.style.opacity = 0; }, 4000);

                    if (index === lyrics.length - 1) {
                        setTimeout(showPhotos, 2500);
                    }
                }, line.time);
            });
        }

        function showPhotos() {
            animationMode = "photos";
            document.getElementById('lyric-container').style.display = 'none';
            
            // အဓိကအမှုန်များကို အနှံ့ပြန့်ကျဲစေခြင်း
            particles.forEach(p => { 
                p.targetX = Math.random() * canvas.width;
                p.targetY = Math.random() * canvas.height;
                p.speed = 0.01;
            });
            
            setTimeout(() => { 
                document.getElementById('slider-panel').style.display = 'block'; 
            }, 500);
        }

        function animate() {
            // Canvas ကို အနည်းငယ် မှောင်စေခြင်းဖြင့် tail effect ရစေသည်
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // ၁။ အစပိုင်း သို့မဟုတ် အသည်းပုံ panel မှာဆိုလျှင် နောက်ခံအမှုန်များကို ပြေးနေစေသည်
            if (animationMode !== "photos") {
                backgroundParticles.forEach(p => { p.update(); p.draw(); });
            }
            
            // ၂။ အဓိကအမှုန်များကို update လုပ်ပြီး ဆွဲသည်
            particles.forEach(p => { p.update(); p.draw(); });
            
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
